services:
  redis:
    image: redis:alpine
    container_name: travox-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./server/.env
    volumes:
      - ./server/firestore-creds.json:/app/firestore-creds.json:ro
    restart: unless-stopped
    networks:
      - network
    depends_on:
      redis:
        condition: service_healthy

networks:
  network:
    driver: bridge
