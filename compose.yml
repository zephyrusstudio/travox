services:
  redis:
    image: redis:alpine
    container_name: travox-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - travox-network
    volumes:
      - redis-data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: travox-server
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./server/.env
    volumes:
      - type: bind
        source: ./server/firestore-creds.json
        target: /app/firestore-creds.json
        read_only: true
    restart: always
    networks:
      - travox-network
    depends_on:
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:3000
        - VITE_GOOGLE_CLIENT_ID=599140815070-9h16gad0fdtvkjif7bkvfk3ppakgl01m.apps.googleusercontent.com
        - VITE_TOKEN_KEY=token
    container_name: travox-client
    ports:
      - "80:80"
    restart: always
    networks:
      - travox-network
    depends_on:
      - server

networks:
  travox-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
