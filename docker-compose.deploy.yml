services:
  redis:
    image: redis:alpine
    container_name: travox-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data

  server:
    image: travox-server:latest
    container_name: travox-server
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./.env
    volumes:
      - type: bind
        source: ./firestore-creds.json
        target: /app/firestore-creds.json
        read_only: true
    restart: always
    networks:
      - network
    depends_on:
      redis:
        condition: service_healthy

networks:
  network:
    driver: bridge

volumes:
  redis-data:
    driver: local
